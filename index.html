<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sho-Me Power Core Values Project | Habitat Communication & Culture</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      /* --------- Habitat-ish base styles --------- */

      :root {
        --brand-bg: #f5f4f0;        /* warm neutral */
        --brand-surface: #ffffff;
        --brand-primary: #2b4c6f;   /* deep blue */
        --brand-accent: #c57b57;    /* warm accent */
        --brand-text-main: #222222;
        --brand-text-muted: #5b6470;
        --brand-border-soft: #e0e2e6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        background: var(--brand-bg);
        color: var(--brand-text-main);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      a {
        color: var(--brand-primary);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      /* --------- Layout --------- */

      .page-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .top-bar {
        background: var(--brand-surface);
        border-bottom: 1px solid var(--brand-border-soft);
      }

      .top-bar-inner {
        max-width: 1080px;
        margin: 0 auto;
        padding: 0.75rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .brand-mark {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .brand-logo {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background: linear-gradient(135deg, var(--brand-primary), var(--brand-accent));
      }

      .brand-text-main {
        font-weight: 600;
        font-size: 0.95rem;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: var(--brand-primary);
      }

      .brand-text-sub {
        font-size: 0.8rem;
        color: var(--brand-text-muted);
      }

      .page {
        flex: 1;
        max-width: 1080px;
        margin: 0 auto;
        padding: 2.5rem 1.5rem 4rem;
      }

      @media (max-width: 600px) {
        .page {
          padding: 1.75rem 1.25rem 3rem;
        }
      }

      /* --------- Sections --------- */

      .hero {
        margin-bottom: 3rem;
      }

      .hero-tag {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.15rem 0.6rem;
        border-radius: 999px;
        background: rgba(197, 123, 87, 0.1);
        color: var(--brand-accent);
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .hero-tag-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--brand-accent);
      }

      .hero h1 {
        font-size: 2.1rem;
        margin: 0.75rem 0 0.5rem;
        color: var(--brand-primary);
      }

      .hero .subtitle {
        font-size: 1.05rem;
        color: var(--brand-text-muted);
        margin-bottom: 1rem;
      }

      .hero p {
        max-width: 720px;
        line-height: 1.5;
      }

      .section {
        margin-bottom: 3rem;
        background: var(--brand-surface);
        border-radius: 10px;
        border: 1px solid var(--brand-border-soft);
        padding: 1.75rem 1.5rem 1.5rem;
      }

      .section h2 {
        font-size: 1.4rem;
        margin: 0 0 0.75rem;
        color: var(--brand-primary);
      }

      .section h3 {
        font-size: 1rem;
        margin: 0 0 0.25rem;
        color: var(--brand-text-main);
      }

      .section p {
        margin: 0 0 0.6rem;
        line-height: 1.5;
      }

      .two-column {
        display: grid;
        gap: 1.75rem;
        margin-top: 0.5rem;
      }
